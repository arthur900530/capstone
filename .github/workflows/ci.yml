name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Create backend config
        run: cp backend/config.py.example backend/config.py

      - name: Import backend
        working-directory: backend
        env:
          OPENHANDS_SUPPRESS_BANNER: "1"
        run: PYTHONPATH=. python -c 'import server; print("ok")'

      - name: Run backend regression tests
        env:
          OPENHANDS_SUPPRESS_BANNER: "1"
          PYTHONPATH: backend
        run: python -m pytest backend/tests backend/reflexion_agent/tests --ignore=backend/reflexion_agent/tests/runs
